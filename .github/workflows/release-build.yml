name: Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "GitHub Releaseを作成する"
        required: true
        type: boolean
        default: true
      version_code:
        description: "アプリのVersionCode（空なら github.run_number を使用）"
        required: false
        type: string
        default: ""
      version_name:
        description: "アプリのVersionName（Releaseタグ名にも使用。空なら0.1.1）"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: implementation

      - name: Decode Keystore
        run: |
          echo "${{ secrets.OKODUKAI_KEYSTORE_BASE64 }}" | base64 -d > implementation/okodukai-release.jks

      - name: Build Release APK and AAB
        id: build_release
        env:
          OKODUKAI_STORE_FILE: ../okodukai-release.jks
          OKODUKAI_STORE_PASSWORD: ${{ secrets.OKODUKAI_STORE_PASSWORD }}
          OKODUKAI_KEY_ALIAS: ${{ secrets.OKODUKAI_KEY_ALIAS }}
          OKODUKAI_KEY_PASSWORD: ${{ secrets.OKODUKAI_KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID || vars.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID || vars.ADMOB_BANNER_AD_UNIT_ID }}
          DEFAULT_VERSION_CODE: ${{ github.run_number }}
        run: |
          if [ -z "${ADMOB_APP_ID}" ] || [ -z "${ADMOB_BANNER_AD_UNIT_ID}" ]; then
            echo "ADMOB_APP_ID / ADMOB_BANNER_AD_UNIT_ID が未設定です（Actions Secrets または Variables を設定してください）" >&2
            exit 1
          fi

          if [ -n "${{ github.event.inputs.version_code }}" ]; then
            VERSION_CODE="${{ github.event.inputs.version_code }}"
          else
            VERSION_CODE="${DEFAULT_VERSION_CODE}"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION_NAME="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          elif [ "${{ github.event.inputs.create_release }}" = "true" ]; then
            echo "workflow_dispatch で Release を作成する場合は version_name を指定してください" >&2
            exit 1
          else
            VERSION_NAME="0.1.1"
          fi

          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

          ./gradlew :app:assembleRelease :app:bundleRelease -PVERSION_CODE="${VERSION_CODE}" -PVERSION_NAME="${VERSION_NAME}"
        working-directory: implementation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: okodukai-release-apk
          path: implementation/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: okodukai-release-aab
          path: implementation/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v7
        with:
          name: okodukai-release-mapping
          path: implementation/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Resolve release tag
        id: release_tag
        if: ${{ github.event_name == 'push' || github.event.inputs.create_release == 'true' }}
        shell: bash
        run: |
          TAG="${{ steps.build_release.outputs.version_name }}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          TITLE="Okodukai ${TAG}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          files=(
            implementation/app/build/outputs/apk/release/*.apk
            implementation/app/build/outputs/bundle/release/*.aab
          )

          if compgen -G "implementation/app/build/outputs/mapping/release/mapping.txt" > /dev/null; then
            files+=(implementation/app/build/outputs/mapping/release/mapping.txt)
          fi

          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              --jq '.body' > "${NOTES_FILE}"

            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
            gh release upload "${TAG}" "${files[@]}" --clobber
          else
            gh release create "${TAG}" "${files[@]}" --title "${TITLE}" --generate-notes
          fi

      - name: Summary
        run: |
          echo "## Release build completed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK: implementation/app/build/outputs/apk/release/*.apk" >> "$GITHUB_STEP_SUMMARY"
          echo "- AAB: implementation/app/build/outputs/bundle/release/*.aab" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mapping: implementation/app/build/outputs/mapping/release/mapping.txt" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- Tag: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event.inputs.create_release }}" = "true" ]; then
            echo "- Tag: ${{ steps.release_tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Release作成: スキップ" >> "$GITHUB_STEP_SUMMARY"
          fi
